<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cake School — Команда</title>
<meta name="description" content="Команда Cake School: оргструктура, задачи и контакты сотрудников." />
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="apple-touch-icon" href="favicon-180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #E78AAE;
  --pink-fill: #FCEFF4;
  --pink-soft: #FBEAF0;
  --pink-deep: #9B3A5E;
  --pink-line: #ED93B1;
  --text: #2A2A2A;
  --muted: #6B655C;
  --cream: #F2EBE0;
  --border: #E8E5E0;
  --border-soft: #F0EDE7;
  --bg: #FFFFFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--pink); }
body { background: var(--pink); color: var(--text); font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; padding: 18px; }
.page { background: white; border-radius: 24px; max-width: 1100px; margin: 0 auto; }
@media (max-width: 640px) { body { padding: 8px; } .page { border-radius: 16px; } }

.header {
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 22px 32px 18px;
  border-bottom: 1px solid var(--border-soft);
  /* Шапка всегда под рукой при скролле */
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(8px);
  border-radius: 24px 24px 0 0;
}
.logo { height: 32px; flex-shrink: 0; }
.nav { display: flex; gap: 4px; }
.nav button {
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  padding: 8px 16px;
  background: transparent;
  border: none;
  border-radius: 999px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s ease;
  /* Убирает 300ms задержку тапа на iOS и предотвращает отмену click при микро-скролле */
  touch-action: manipulation;
  /* Визуальный отклик на тап вместо системной серой подсветки */
  -webkit-tap-highlight-color: rgba(231, 138, 174, 0.2);
}
/* hover только для устройств с указателем — иначе на тач-экранах он «залипает»
   и первый тап лишь показывает hover, а не переключает раздел */
@media (hover: hover) {
  .nav button:hover { color: var(--text); background: var(--pink-fill); }
}
.nav button.active { background: var(--pink); color: white; }
@media (max-width: 640px) {
  .header { flex-direction: column; align-items: flex-start; gap: 12px; padding: 14px 18px; border-radius: 16px 16px 0 0; }
  .logo { height: 28px; }
  .nav { width: 100%; }
  .nav button { padding: 6px 12px; font-size: 13px; }
}

.main { padding: 36px 32px 80px; max-width: 1200px; margin: 0 auto; }
@media (max-width: 640px) { .main { padding: 22px 16px 60px; } }

h1 { font-size: 26px; font-weight: 600; margin-bottom: 22px; letter-spacing: -0.01em; }
@media (max-width: 640px) { h1 { font-size: 22px; margin-bottom: 16px; } }

.section { display: none; }
.section.active { display: block; }

/* Structure */
.structure-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 12px; }
.structure-wrap svg { display: block; min-width: 680px; max-width: 760px; margin: 0 auto; height: auto; }
.legend { margin-top: 14px; font-size: 13px; color: var(--muted); text-align: center; }
.legend strong { color: var(--pink); }
/* Подсказка «поверни телефон» — только на узких экранах в вертикальном положении */
.rotate-hint { display: none; }
/* Кнопка увеличения схемы — только на мобильном */
.zoom-toggle { display: none; }
@media (max-width: 640px) {
  /* Вписываем всю схему в ширину экрана, чтобы не нужно было листать вбок */
  .structure-wrap svg { min-width: 0; width: 100%; }
  /* В режиме увеличения — натуральный размер с прокруткой вбок */
  .structure-wrap.zoomed svg { min-width: 680px; width: auto; }
  .zoom-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--pink-deep);
    background: var(--pink-fill);
    border: none;
    border-radius: 999px;
    padding: 7px 14px;
    margin-bottom: 12px;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: rgba(231, 138, 174, 0.2);
  }
}
@media (max-width: 640px) and (orientation: portrait) {
  .rotate-hint {
    display: block;
    font-size: 12px;
    line-height: 1.4;
    color: var(--pink-deep);
    background: var(--pink-fill);
    border-radius: 10px;
    padding: 9px 12px;
    margin-bottom: 14px;
    text-align: center;
  }
}

/* Tasks page — hierarchical groups */
.people-section { margin-bottom: 36px; }
.people-section:last-child { margin-bottom: 0; }
.group-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--pink-deep);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--pink-fill);
}
.tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 14px; }
@media (max-width: 640px) { .tasks-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
@media (max-width: 380px) { .tasks-grid { grid-template-columns: 1fr; } }

.person-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 14px 16px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: center;
}
.person-card:hover {
  background: var(--pink);
  border-color: var(--pink);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(231,138,174,0.25);
}
.person-card:hover .person-name { color: white; }
.person-card:hover .person-role { color: rgba(255,255,255,0.88); }
.person-card:hover .avatar { background: white; color: var(--pink); }
.avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--pink-fill);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--pink-deep);
  font-weight: 600;
  font-size: 18px;
  margin-bottom: 10px;
  overflow: hidden;
}
.avatar img, .member-avatar img, .modal-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.person-name { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 3px; }
.person-role { font-size: 11px; color: var(--muted); line-height: 1.35; }

/* Modal */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(42,42,42,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  z-index: 100;
  animation: fadeIn 0.15s ease;
}
.modal-backdrop.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: white;
  border-radius: 20px;
  max-width: 720px;
  width: 100%;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@media (max-width: 640px) {
  .modal-backdrop { padding: 0; align-items: flex-end; }
  .modal { border-radius: 20px 20px 0 0; max-height: 95vh; }
}

.modal-header {
  padding: 26px 28px 18px;
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  gap: 14px;
  align-items: flex-start;
  position: relative;
}
@media (max-width: 640px) { .modal-header { padding: 20px 20px 16px; } }
.modal-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--pink-fill);
  color: var(--pink-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 17px;
  flex-shrink: 0;
  overflow: hidden;
}
.modal-info { flex: 1; padding-right: 32px; }
.modal-name { font-size: 17px; font-weight: 600; margin-bottom: 3px; }
.modal-role { font-size: 13px; color: var(--muted); line-height: 1.4; }
.modal-coords { font-size: 12px; color: var(--muted); margin-top: 8px; font-style: italic; line-height: 1.5; }
.modal-close {
  position: absolute;
  top: 18px;
  right: 18px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: none;
  background: var(--pink-fill);
  color: var(--pink-deep);
  font-size: 17px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
}
.modal-close:hover { background: var(--pink); color: white; }
.modal-body { padding: 18px 28px 26px; overflow-y: auto; flex: 1; }
@media (max-width: 640px) { .modal-body { padding: 16px 20px 24px; } }

.task-section { margin-top: 18px; }
.task-section:first-child { margin-top: 0; }
.task-section h4 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid var(--border-soft); }
.task-section ul { list-style: none; padding: 0; }
.task-section li { font-size: 13px; line-height: 1.5; padding: 3px 0 3px 16px; position: relative; color: var(--text); }
.task-section li::before { content: '·'; position: absolute; left: 4px; color: var(--pink); font-weight: 700; }
.task-empty { color: var(--muted); font-style: italic; font-size: 13px; padding: 10px 0; }

.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 70px 20px;
  background: var(--pink-fill);
  border-radius: 20px;
  text-align: center;
}
.placeholder-icon { font-size: 36px; margin-bottom: 14px; }
.placeholder p { font-size: 14px; color: var(--pink-deep); max-width: 340px; line-height: 1.5; }

/* Team page */
.members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }
@media (max-width: 640px) { .members-grid { grid-template-columns: 1fr; gap: 12px; } }

.member-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  transition: border-color 0.15s ease;
}
.member-card:hover { border-color: var(--pink); }

.member-card-header { display: flex; gap: 12px; align-items: center; }

.member-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--pink-fill); color: var(--pink-deep);
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 15px; flex-shrink: 0;
  overflow: hidden;
}
.member-name-block { flex: 1; min-width: 0; }
.member-name { font-size: 14px; font-weight: 600; line-height: 1.3; margin-bottom: 2px; }
.member-role { font-size: 12px; color: var(--muted); line-height: 1.4; }

.member-info { display: flex; flex-direction: column; gap: 7px; font-size: 13px; }
.member-row { display: flex; gap: 10px; line-height: 1.4; align-items: flex-start; }
.member-row-label { color: var(--muted); font-size: 12px; flex-shrink: 0; width: 64px; padding-top: 1px; }
.member-row-val { color: var(--text); word-break: break-word; flex: 1; min-width: 0; }
.member-row-val a { color: var(--text); text-decoration: none; }
.member-row-val a:hover { color: var(--pink); }
.member-note { color: var(--muted); font-style: italic; }
</style>
</head>
<body>

<div class="page">
<header class="header">
  <img src="logo.png" alt="Cake School" class="logo" />
  <nav class="nav">
    <button data-target="structure" class="active">Структура</button>
    <button data-target="tasks">Задачи</button>
    <button data-target="team">Команда</button>
  </nav>
</header>

<main class="main">

  <section id="structure" class="section active">
    <h1>Структура команды</h1>
    <p class="rotate-hint">📱 Поверните телефон горизонтально, чтобы рассмотреть схему крупнее</p>
    <button class="zoom-toggle" id="zoomToggle" type="button">🔍 Увеличить</button>
    <div class="structure-wrap" id="structureWrap">
      <svg viewBox="0 0 680 762" xmlns="http://www.w3.org/2000/svg" width="100%">
        <!-- Founders -->
        <rect x="195" y="18" width="130" height="40" rx="10" fill="white" stroke="#D5D2CB" stroke-width="1"/>
        <text x="260" y="38" text-anchor="middle" font-size="13" font-weight="600" fill="#2A2A2A" font-family="Manrope, sans-serif">Алёна Сахарова</text>
        <text x="260" y="52" text-anchor="middle" font-size="11" fill="#6B655C" font-family="Manrope, sans-serif">основатель</text>
        <rect x="355" y="18" width="130" height="40" rx="10" fill="white" stroke="#D5D2CB" stroke-width="1"/>
        <text x="420" y="38" text-anchor="middle" font-size="13" font-weight="600" fill="#2A2A2A" font-family="Manrope, sans-serif">Алина Макарова</text>
        <text x="420" y="52" text-anchor="middle" font-size="11" fill="#6B655C" font-family="Manrope, sans-serif">основатель</text>

        <!-- Алёна → Саша, Катя -->
        <line x1="260" y1="58" x2="260" y2="75" stroke="#B5B1A8" stroke-width="1"/>
        <line x1="260" y1="67" x2="420" y2="67" stroke="#B5B1A8" stroke-width="1"/>
        <line x1="420" y1="67" x2="420" y2="75" stroke="#B5B1A8" stroke-width="1"/>

        <!-- Алина → Саша, Катя — связь через основателей (см. выше) -->

        <!-- Leaders -->
        <rect x="195" y="75" width="130" height="44" rx="10" fill="#FBEAF0" stroke="#E78AAE" stroke-width="1"/>
        <text x="260" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#9B3A5E" font-family="Manrope, sans-serif">Саша Большакова</text>
        <text x="260" y="111" text-anchor="middle" font-size="11" fill="#9B3A5E" font-family="Manrope, sans-serif">управляющий</text>
        <rect x="355" y="75" width="130" height="44" rx="10" fill="#FBEAF0" stroke="#E78AAE" stroke-width="1"/>
        <text x="420" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#9B3A5E" font-family="Manrope, sans-serif">Катя Ашихмина</text>
        <text x="420" y="111" text-anchor="middle" font-size="11" fill="#9B3A5E" font-family="Manrope, sans-serif">маркетолог</text>

        <!-- Магистраль Саши -->
        <line x1="260" y1="119" x2="260" y2="127" stroke="#888781" stroke-width="2"/>
        <line x1="260" y1="127" x2="340" y2="127" stroke="#888781" stroke-width="2"/>
        <line x1="340" y1="127" x2="340" y2="356" stroke="#888781" stroke-width="2"/>
        <line x1="340" y1="400" x2="340" y2="628" stroke="#888781" stroke-width="2"/>

        <!-- Отвод к direct row 1 -->
        <line x1="340" y1="127" x2="92" y2="127" stroke="#B5B1A8" stroke-width="1"/>
        <line x1="92" y1="127" x2="92" y2="135" stroke="#B5B1A8" stroke-width="1"/>
        <line x1="247" y1="127" x2="247" y2="135" stroke="#B5B1A8" stroke-width="1"/>

        <!-- Отвод к direct row 2 -->
        <line x1="340" y1="222" x2="92" y2="222" stroke="#B5B1A8" stroke-width="1"/>
        <line x1="92" y1="222" x2="92" y2="230" stroke="#B5B1A8" stroke-width="1"/>
        <line x1="247" y1="222" x2="247" y2="230" stroke="#B5B1A8" stroke-width="1"/>

        <!-- Пунктир Саша → Асаль (в левый бок Асаль через зазор) -->
        <line x1="260" y1="127" x2="345" y2="127" stroke="#E78AAE" stroke-width="1" stroke-dasharray="4 3"/>
        <line x1="345" y1="127" x2="345" y2="248" stroke="#E78AAE" stroke-width="1" stroke-dasharray="4 3"/>
        <line x1="345" y1="248" x2="430" y2="248" stroke="#E78AAE" stroke-width="1" stroke-dasharray="4 3"/>

        <!-- Sasha direct row 1 -->
        <rect x="20" y="135" width="145" height="44" rx="10" fill="white" stroke="#D5D2CB" stroke-width="1"/>
        <text x="92" y="155" text-anchor="middle" font-size="13" font-weight="600" fill="#2A2A2A" font-family="Manrope, sans-serif">Настя Соловьёва</text>
        <text x="92" y="171" text-anchor="middle" font-size="11" fill="#6B655C" font-family="Manrope, sans-serif">приложение / My Cake</text>
        <rect x="175" y="135" width="145" height="44" rx="10" fill="white" stroke="#D5D2CB" stroke-width="1"/>
        <text x="247" y="155" text-anchor="middle" font-size="13" font-weight="600" fill="#2A2A2A" font-family="Manrope, sans-serif">Виктория Иванова</text>
        <text x="247" y="171" text-anchor="middle" font-size="11" fill="#6B655C" font-family="Manrope, sans-serif">Salebot</text>

        <!-- Sasha direct row 2 -->
        <rect x="20" y="230" width="145" height="36" rx="10" fill="white" stroke="#D5D2CB" stroke-width="1"/>
        <text x="92" y="246" text-anchor="middle" font-size="13" font-weight="600" fill="#2A2A2A" font-family="Manrope, sans-serif">Подрядчики</text>
        <text x="92" y="261" text-anchor="middle" font-size="11" fill="#6B655C" font-family="Manrope, sans-serif">сторонние</text>
        <rect x="175" y="230" width="145" height="36" rx="10" fill="white" stroke="#D5D2CB" stroke-width="1"/>
        <text x="247" y="246" text-anchor="middle" font-size="13" font-weight="600" fill="#2A2A2A" font-family="Manrope, sans-serif">Ира Флерова</text>
        <text x="247" y="261" text-anchor="middle" font-size="11" fill="#6B655C" font-family="Manrope, sans-serif">тех. спец.</text>

        <!-- Отвод к подряду -->
        <line x1="340" y1="282" x2="85" y2="282" stroke="#B5B1A8" stroke-width="1"/>
        <line x1="85" y1="282" x2="85" y2="290" stroke="#B5B1A8" stroke-width="1"/>
        <line x1="225" y1="282" x2="225" y2="290" stroke="#B5B1A8" stroke-width="1"/>

        <!-- Подряд Саши -->
        <rect x="20" y="290" width="130" height="44" rx="10" fill="white" stroke="#D5D2CB" stroke-width="1"/>
        <text x="85" y="310" text-anchor="middle" font-size="13" font-weight="600" fill="#2A2A2A" font-family="Manrope, sans-serif">Айна Сероедова</text>
        <text x="85" y="325" text-anchor="middle" font-size="11" fill="#6B655C" font-family="Manrope, sans-serif">бухгалтер</text>
        <rect x="160" y="290" width="130" height="44" rx="10" fill="white" stroke="#D5D2CB" stroke-width="1"/>
        <text x="225" y="310" text-anchor="middle" font-size="13" font-weight="600" fill="#2A2A2A" font-family="Manrope, sans-serif">Татьяна Ч.</text>
        <text x="225" y="325" text-anchor="middle" font-size="11" fill="#6B655C" font-family="Manrope, sans-serif">юрист</text>

        <!-- Катя → direct -->
        <line x1="420" y1="119" x2="420" y2="127" stroke="#888781" stroke-width="2"/>
        <line x1="420" y1="127" x2="585" y2="127" stroke="#888781" stroke-width="2"/>
        <line x1="425" y1="127" x2="425" y2="135" stroke="#888781" stroke-width="2"/>
        <line x1="585" y1="127" x2="585" y2="135" stroke="#888781" stroke-width="2"/>
        <line x1="505" y1="127" x2="505" y2="230" stroke="#888781" stroke-width="2"/>

        <!-- Пунктир Катя → Ира (через левый зазор, минуя Любу) -->
        <line x1="420" y1="127" x2="330" y2="127" stroke="#E78AAE" stroke-width="1" stroke-dasharray="4 3"/>
        <line x1="330" y1="127" x2="330" y2="248" stroke="#E78AAE" stroke-width="1" stroke-dasharray="4 3"/>
        <line x1="330" y1="248" x2="320" y2="248" stroke="#E78AAE" stroke-width="1" stroke-dasharray="4 3"/>

        <!-- Люба → Подрядчики по рекламе -->
        <line x1="425" y1="179" x2="425" y2="290" stroke="#888781" stroke-width="2"/>

        <rect x="350" y="135" width="150" height="44" rx="10" fill="white" stroke="#D5D2CB" stroke-width="1"/>
        <text x="425" y="155" text-anchor="middle" font-size="13" font-weight="600" fill="#2A2A2A" font-family="Manrope, sans-serif">Люба Солодкая</text>
        <text x="425" y="171" text-anchor="middle" font-size="11" fill="#6B655C" font-family="Manrope, sans-serif">реклама</text>

function renderTeam() {
  const container = document.getElementById('teamContainer');
  container.innerHTML = TEAM_GROUPS.map(g => `
    <div class="people-section">
      <h2 class="group-title">${g.title}</h2>
      <div class="members-grid">
        ${g.ids.map(id => {
          const m = DIR[id] && DIR[id].team;
          if (!m) return '';
          return renderMemberCard(m, id);
        }).join('')}
      </div>
    </div>
  `).join('');
}

function renderMemberCard(m, id) {
  const rows = [];
  if (m.tg) rows.push(['Telegram', `<a href="https://t.me/${m.tg.replace('@','')}" target="_blank" rel="noopener">${m.tg}</a>`]);
  if (m.phone) rows.push(['Телефон', `<a href="tel:${m.phone.replace(/[^+0-9]/g,'')}">${m.phone}</a>`]);
  if (m.email) rows.push(['Email', `<a href="mailto:${m.email.trim()}">${m.email}</a>`]);
  if (m.bday) rows.push(['ДР', m.bday]);
  if (m.address) rows.push(['Адрес', m.address]);
  if (m.note) rows.push(['Заметка', `<span class="member-note">${m.note}</span>`]);
  return `
    <div class="member-card">
      <div class="member-card-header">
        ${renderAvatar(id, m.name, 'member-avatar')}
        <div class="member-name-block">
          <div class="member-name">${m.name}</div>
          <div class="member-role">${m.role}</div>
        </div>
      </div>
      ${rows.length ? `<div class="member-info">${rows.map(([k, v]) => `<div class="member-row"><span class="member-row-label">${k}</span><span class="member-row-val">${v}</span></div>`).join('')}</div>` : ''}
    </div>
  `;
}

const PHOTOS = {};

function renderAvatar(id, name, cls) {
  const photo = PHOTOS[id];
  return photo
    ? `<div class="${cls}"><img src="${photo}" alt="${name}" loading="lazy"></div>`
    : `<div class="${cls}">${initials(name)}</div>`;
}

function initials(name) {
  const parts = name.trim().split(/\s+/);
  return parts.slice(0, 2).map(p => p[0]).join('').toUpperCase();
}

function renderTasksPage() {
  const container = document.getElementById('tasksContainer');
  container.innerHTML = GROUPS.map(g => `
    <div class="people-section">
      <h2 class="group-title">${g.title}</h2>
      <div class="tasks-grid">
        ${g.ids.map(id => {
          const p = DIR[id];
          if (!p) return '';
          return `
            <div class="person-card" data-id="${id}">
              ${renderAvatar(id, p.name, 'avatar')}
              <div class="person-name">${p.name}</div>
              <div class="person-role">${p.role}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `).join('');
  container.querySelectorAll('.person-card').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.id));
  });
}

function openModal(id) {
  const p = DIR[id];
  if (!p) return;
  const modalAvatar = document.getElementById('modalAvatar');
  const photo = PHOTOS[id];
  if (photo) {
    modalAvatar.innerHTML = `<img src="${photo}" alt="${p.name}" loading="lazy">`;
  } else {
    modalAvatar.textContent = initials(p.name);
  }
  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalRole').textContent = p.role;
  const coordsEl = document.getElementById('modalCoords');
  if (p.coords) {
    coordsEl.textContent = 'Координирует работу: ' + p.coords;
    coordsEl.style.display = 'block';
  } else {
    coordsEl.style.display = 'none';
  }
  const body = document.getElementById('modalBody');
  if (p.sections.length === 0) {
    body.innerHTML = '<p class="task-empty">Задачи пока не прописаны.</p>';
  } else {
    body.innerHTML = p.sections.map(s => `
      <div class="task-section">
        <h4>${s.title}</h4>
        <ul>${s.items.map(t => `<li>${t}</li>`).join('')}</ul>
      </div>
    `).join('');
  }
  document.getElementById('modalBackdrop').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalBackdrop').addEventListener('click', (e) => {
  if (e.target.id === 'modalBackdrop') closeModal();
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

document.querySelectorAll('.nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const target = btn.dataset.target;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(target).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

    zoomToggle.textContent = zoomed ? '🔍 Свернуть' : '🔍 Увеличить';
  });
}
